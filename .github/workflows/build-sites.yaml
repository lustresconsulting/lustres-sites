name: Build Sites

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sites/**'
      - '.github/workflows/build-sites.yaml'

env:
  REGISTRY: ghcr.io

jobs:
  detect-changes:
    name: Detect Changed Sites
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed sites
        id: set-matrix
        run: |
          CHANGED_SITES="[]"
          SITES=("landing" "cloud" "agentic")
          for site in "${SITES[@]}"; do
            if git diff --name-only HEAD~1 HEAD -- "sites/$site/" | grep -q .; then
              CHANGED_SITES=$(echo "$CHANGED_SITES" | jq -c ". + [\"$site\"]")
            fi
          done
          # On workflow_dispatch, build all
          if [ "$CHANGED_SITES" = "[]" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED_SITES='["landing","cloud","agentic"]'
          fi
          # Also build all if this is the very first commit
          if [ "$CHANGED_SITES" = "[]" ] && ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED_SITES='["landing","cloud","agentic"]'
          fi
          echo "matrix={\"site\":$CHANGED_SITES}" >> $GITHUB_OUTPUT
          if [ "$CHANGED_SITES" = "[]" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  build-push:
    name: Build & Push ${{ matrix.site }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.BOT_GITHUB_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/lustresconsulting/lustres-${{ matrix.site }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: sites/${{ matrix.site }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.site }}
          cache-to: type=gha,mode=max,scope=${{ matrix.site }}

  update-orbit-tags:
    name: Update Image Tags in Orbit Repo
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    if: needs.detect-changes.outputs.has_changes == 'true'
    permissions:
      contents: read
    steps:
      - name: Extract short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Checkout orbit repo
        uses: actions/checkout@v4
        with:
          repository: lustresconsulting/orbit
          token: ${{ secrets.BOT_GITHUB_PAT }}
          ref: main

      - name: Update image tags for changed sites
        run: |
          SITES='${{ needs.detect-changes.outputs.matrix }}'
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          for site in $(echo "$SITES" | jq -r '.site[]'); do
            VALUES_FILE="deploy/helm-values/lustres-${site}.yaml"
            if [ -f "$VALUES_FILE" ]; then
              sed -i "s/tag: .*/tag: \"${SHORT_SHA}\"/" "$VALUES_FILE"
              echo "Updated $VALUES_FILE to tag: $SHORT_SHA"
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "sunnepah-bot"
          git config user.email "bot@lustres.dev"
          git add deploy/helm-values/lustres-*.yaml
          git diff --staged --quiet && echo "No tag changes" && exit 0
          SHORT_SHA="${{ steps.sha.outputs.short }}"
          git commit -m "chore(sites): update image tags to ${SHORT_SHA} [skip ci]"
          git pull --rebase origin main
          git push origin main
